  run-orders-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: |
          if [ -z "$TEST_SECRET" ]; then
            echo "SECRET IS EMPTY"
          else
            echo "SECRET IS SET - HELLO"
          fi
        env:
          TEST_SECRET: ${{ secrets.TEST_SECRET }}
      - run: |
          if [ -z "$TEST_SECRET_ENV" ]; then
            echo "SECRET IS EMPTY"
          else
            echo "SECRET IS SET - HELLO"
          fi
        env:
          TEST_SECRET: ${{ secrets.TEST_SECRET_ENV }}

      - run: pip install -r requirements.txt
      - run: python orders_update.py
        env:
          ORDERS: ${{ secrets.ORDERS }}
          ORDERS_UPDATE: ${{ secrets.ORDERS_UPDATE }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_SECRET: ${{ secrets.SHOPIFY_SECRET }}
          MERCHANT: ${{ secrets.MERCHANT }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
